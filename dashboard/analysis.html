<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attrition Analysis - AttritionAI Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --gold: #3b82f6;
            --amber: #60a5fa;
            --glass-border: rgba(255, 255, 255, 0.10);
            --text-primary: #ffffff;
            --text-secondary: #b0b0c0;
            --shadow-acrylic: 0 8px 32px rgba(0, 0, 0, 0.35), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 15% 20%, rgba(59, 130, 246, 0.11) 0%, transparent 40%),
                        radial-gradient(ellipse at 85% 80%, rgba(96, 165, 250, 0.08) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.035;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }
        .dashboard-container { position: relative; z-index: 2; min-height: 100vh; display: flex; }
        .sidebar {
            width: 280px;
            padding: 24px 16px;
            background: rgba(18, 18, 26, 0.75);
            backdrop-filter: blur(40px) saturate(180%);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 32px;
        }
        .logo { display: flex; align-items: center; gap: 12px; padding: 12px; font-size: 20px; font-weight: 700; color: var(--gold); }
        .logo i { font-size: 28px; }
        .nav-menu { display: flex; flex-direction: column; gap: 8px; }
        .nav-item {
            display: flex; align-items: center; gap: 16px; padding: 14px 16px; border-radius: 12px;
            color: rgba(255, 255, 255, 0.85); text-decoration: none; font-size: 15px; font-weight: 500;
            transition: all 0.3s;
        }
        .nav-item:hover { background: rgba(59, 130, 246, 0.12); }
        .nav-item.active { background: rgba(59, 130, 246, 0.18); color: var(--gold); border: 1px solid rgba(59, 130, 246, 0.35); }
        .nav-item i { width: 20px; font-size: 18px; }
        .main-content { flex: 1; overflow-y: auto; }
        .header {
            padding: 24px 32px;
            background: rgba(18, 18, 26, 0.72);
            backdrop-filter: blur(40px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky; top: 0; z-index: 5;
        }
        .header h1 {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--amber));
            background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { color: rgba(255, 255, 255, 0.7); font-size: 14px; margin-top: 4px; }
        .content { padding: 32px; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 24px; }
        .chart-card {
            background: rgba(26, 26, 38, 0.65);
            backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow-acrylic);
        }
        .chart-card h3 { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text-primary); }
        .chart-container { height: 300px; }
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .logo span, .nav-item span { display: none; }
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-chart-line"></i><span>AttritionAI</span></div>
            <nav class="nav-menu">
                <a href="/" class="nav-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
                <a href="/employees" class="nav-item"><i class="fas fa-users"></i><span>Employees</span></a>
                <a href="/analysis" class="nav-item active"><i class="fas fa-chart-bar"></i><span>Attrition Analysis</span></a>
                <a href="/predictions" class="nav-item"><i class="fas fa-brain"></i><span>Predictions</span></a>
                <a href="/reports" class="nav-item"><i class="fas fa-file-alt"></i><span>Reports</span></a>
                <a href="/settings" class="nav-item" style="margin-top:auto;"><i class="fas fa-cog"></i><span>Settings</span></a>
            </nav>
        </aside>
        <main class="main-content">
            <header class="header">
                <h1>Attrition Analysis</h1>
                <p>Deep dive into attrition patterns and trends</p>
            </header>
            <div class="content">
                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>Attrition by Department</h3>
                        <div class="chart-container"><canvas id="deptChart"></canvas></div>
                    </div>
                    <div class="chart-card">
                        <h3>Attrition by Age Group</h3>
                        <div class="chart-container"><canvas id="ageChart"></canvas></div>
                    </div>
                    <div class="chart-card">
                        <h3>Monthly Attrition Trend</h3>
                        <div class="chart-container"><canvas id="trendChart"></canvas></div>
                    </div>
                    <div class="chart-card">
                        <h3>Attrition by Job Satisfaction</h3>
                        <div class="chart-container"><canvas id="satisfactionChart"></canvas></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        const chartOptions = {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#b0b0c0' } } },
            scales: { x: { ticks: { color: '#7a7a90' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                      y: { ticks: { color: '#7a7a90' }, grid: { color: 'rgba(255,255,255,0.05)' } } }
        };
        new Chart(document.getElementById('deptChart'), {
            type: 'bar',
            data: { labels: ['Sales', 'R&D', 'HR', 'IT', 'Marketing'],
                    datasets: [{ label: 'Attrition Rate %', data: [21, 14, 19, 12, 16],
                                backgroundColor: 'rgba(59, 130, 246, 0.6)', borderColor: '#3b82f6', borderWidth: 1 }] },
            options: chartOptions
        });
        new Chart(document.getElementById('ageChart'), {
            type: 'doughnut',
            data: { labels: ['18-25', '26-35', '36-45', '46-55', '55+'],
                    datasets: [{ data: [28, 35, 20, 12, 5],
                                backgroundColor: ['#3b82f6', '#60a5fa', '#93c5fd', '#f97316', '#ea580c'] }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#b0b0c0' } } } }
        });
        new Chart(document.getElementById('trendChart'), {
            type: 'line',
            data: { labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{ label: 'Attrition Count', data: [5, 8, 6, 9, 7, 4],
                                borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 }] },
            options: chartOptions
        });
        new Chart(document.getElementById('satisfactionChart'), {
            type: 'bar',
            data: { labels: ['Low', 'Medium', 'High', 'Very High'],
                    datasets: [{ label: 'Attrition %', data: [31, 22, 15, 8],
                                backgroundColor: ['#ef4444', '#3b82f6', '#60a5fa', '#10b981'] }] },
            options: chartOptions
        });
    </script>
</body>
</html>
